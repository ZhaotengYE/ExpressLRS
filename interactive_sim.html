<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>LDTP Interactive Simulation</title>
<style>
:root{--bg:#0f1923;--panel:#1a2332;--border:#2a3a4e;--accent:#00b4d8;--ok:#2ecc71;
--warn:#f39c12;--fail:#e74c3c;--rel:#3498db;--unrel:#27ae60;--txt:#d4dde8;--dim:#6b7d8e;
--hi:#00e5ff;--retx:#e056a0;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--txt);font-family:'Inter','SF Pro Display',-apple-system,sans-serif;
font-size:13px;overflow:hidden;height:100vh;display:flex;flex-direction:column;}
/* Layout */
.app{display:flex;flex:1;overflow:hidden;}
.sidebar{width:300px;min-width:300px;background:var(--panel);border-right:1px solid var(--border);
display:flex;flex-direction:column;overflow-y:auto;}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.canvas-area{flex:1;position:relative;min-height:0;}
.canvas-area canvas{display:block;width:100%;height:100%;}
.bottom-panel{height:260px;min-height:160px;background:var(--panel);border-top:1px solid var(--border);
display:flex;flex-direction:column;overflow:hidden;}
/* Sidebar */
.sidebar-header{padding:16px;background:linear-gradient(135deg,#0d2137,#1a3a5c);border-bottom:1px solid var(--border);}
.sidebar-header h1{font-size:16px;color:var(--hi);font-weight:700;letter-spacing:0.5px;}
.sidebar-header p{font-size:11px;color:var(--dim);margin-top:2px;}
.section{padding:12px 16px;border-bottom:1px solid var(--border);}
.section-title{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--dim);margin-bottom:10px;font-weight:600;}
.control-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.control-row label{font-size:12px;color:var(--txt);flex-shrink:0;}
.control-row .val{font-size:12px;color:var(--accent);font-weight:600;min-width:50px;text-align:right;}
input[type=range]{-webkit-appearance:none;width:120px;height:4px;background:var(--border);border-radius:2px;outline:none;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;background:var(--accent);border-radius:50%;cursor:pointer;}
select,input[type=number]{background:var(--bg);color:var(--txt);border:1px solid var(--border);border-radius:4px;
padding:4px 8px;font-size:12px;outline:none;width:120px;}
select:focus,input[type=number]:focus{border-color:var(--accent);}
/* Presets */
.presets{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px;}
.preset-btn{padding:4px 10px;border-radius:4px;border:1px solid var(--border);background:var(--bg);
color:var(--txt);font-size:11px;cursor:pointer;transition:all .15s;}
.preset-btn:hover{border-color:var(--accent);color:var(--accent);}
.preset-btn.active{background:var(--accent);color:#000;border-color:var(--accent);font-weight:600;}
/* Messages schedule */
.msg-list{max-height:120px;overflow-y:auto;}
.msg-item{display:flex;align-items:center;gap:6px;padding:3px 0;font-size:11px;}
.msg-item .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.msg-item .dot.ul{background:var(--accent);}
.msg-item .dot.dl{background:var(--ok);}
.msg-item .remove{color:var(--fail);cursor:pointer;margin-left:auto;font-size:14px;opacity:0.6;}
.msg-item .remove:hover{opacity:1;}
.add-msg{display:flex;gap:4px;margin-top:6px;}
.add-msg input{width:45px;}
.add-msg button{padding:3px 8px;background:var(--bg);border:1px solid var(--border);color:var(--txt);
border-radius:4px;cursor:pointer;font-size:11px;}
.add-msg button:hover{border-color:var(--accent);}
/* Transport controls */
.transport{padding:12px 16px;border-top:1px solid var(--border);margin-top:auto;background:var(--bg);}
.transport-btns{display:flex;gap:6px;margin-bottom:10px;}
.btn{padding:8px 16px;border-radius:6px;border:none;cursor:pointer;font-size:12px;font-weight:600;
transition:all .15s;}
.btn-primary{background:var(--accent);color:#000;flex:1;}
.btn-primary:hover{background:var(--hi);}
.btn-primary:disabled{opacity:0.4;cursor:default;}
.btn-secondary{background:var(--border);color:var(--txt);flex:1;}
.btn-secondary:hover{background:#3a4a5e;}
.speed-row{display:flex;align-items:center;gap:8px;}
.speed-row label{font-size:11px;color:var(--dim);}
.speed-btns{display:flex;gap:2px;}
.speed-btn{padding:3px 8px;border-radius:3px;border:1px solid var(--border);background:transparent;
color:var(--dim);font-size:11px;cursor:pointer;}
.speed-btn.active{background:var(--accent);color:#000;border-color:var(--accent);}
/* Progress bar */
.progress-bar{width:100%;height:3px;background:var(--border);border-radius:2px;margin-top:8px;cursor:pointer;}
.progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width 0.05s linear;}
/* Bottom tabs */
.tab-bar{display:flex;border-bottom:1px solid var(--border);background:var(--bg);}
.tab{padding:8px 16px;font-size:12px;cursor:pointer;border-bottom:2px solid transparent;color:var(--dim);transition:all .15s;}
.tab:hover{color:var(--txt);}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.tab-content{flex:1;overflow-y:auto;padding:8px 12px;font-family:'SF Mono',Consolas,monospace;font-size:12px;}
.tab-pane{display:none;}
.tab-pane.active{display:block;}
/* Log */
.log-entry{padding:2px 0;border-bottom:1px solid rgba(42,58,78,0.3);}
.log-entry .tick{color:var(--dim);display:inline-block;width:45px;}
.log-entry.lost{color:var(--fail);}
.log-entry.ok{color:var(--ok);}
.log-entry.rel{color:var(--rel);}
.log-entry.retx{color:var(--retx);}
.log-entry.ack{color:var(--warn);}
.log-entry.app{color:var(--hi);}
/* Stats grid */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;padding:8px;}
.stat-card{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:10px;text-align:center;}
.stat-card .v{font-size:22px;font-weight:700;color:var(--accent);}
.stat-card .v.warn{color:var(--warn);}
.stat-card .v.fail{color:var(--fail);}
.stat-card .l{font-size:10px;color:var(--dim);margin-top:2px;}
/* Message tracker */
.msg-tracker{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:6px;padding:8px;}
.msg-track{background:var(--bg);border-left:3px solid var(--dim);border-radius:0 6px 6px 0;padding:8px 10px;}
.msg-track.pending{border-left-color:var(--dim);}
.msg-track.inflight{border-left-color:var(--warn);animation:pulse 1s infinite;}
.msg-track.delivered{border-left-color:var(--ok);}
.msg-track.failed{border-left-color:var(--fail);}
.msg-track.timeout{border-left-color:var(--warn);}
.msg-track .dir{font-size:10px;color:var(--dim);}
.msg-track .name{font-size:13px;font-weight:600;margin:2px 0;}
.msg-track .info{font-size:11px;color:var(--dim);}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.6;}}
/* Overlay */
.overlay{position:absolute;top:10px;left:10px;right:10px;display:flex;justify-content:space-between;
pointer-events:none;z-index:10;}
.overlay-card{background:rgba(26,35,50,0.85);border:1px solid var(--border);border-radius:6px;
padding:6px 12px;font-size:11px;backdrop-filter:blur(8px);}
.overlay-card .big{font-size:20px;font-weight:700;color:var(--hi);}
</style>
</head>
<body>
<div class="app">
<!-- Sidebar -->
<div class="sidebar">
  <div class="sidebar-header">
    <h1>LDTP Simulation</h1>
    <p>LoRa Dual-Channel Transport Protocol</p>
  </div>

  <div class="section">
    <div class="section-title">Channel Preset</div>
    <div class="presets" id="presets"></div>
  </div>

  <div class="section">
    <div class="section-title">Channel Parameters</div>
    <div class="control-row"><label>Model</label>
      <select id="ch-model"><option value="uniform">Uniform</option><option value="burst">Burst (Gilbert)</option>
      <option value="asymmetric">Asymmetric</option><option value="blackout">Blackout</option></select></div>
    <div class="control-row"><label id="loss-label">Loss Rate</label><input type="range" id="loss" min="0" max="95" value="20"><span class="val" id="loss-val">20%</span></div>
    <div id="burst-params" style="display:none">
      <div class="control-row"><label>Bad State Loss</label><input type="range" id="burst-bad" min="30" max="99" value="80"><span class="val" id="burst-bad-val">80%</span></div>
      <div class="control-row"><label>→Bad prob</label><input type="range" id="burst-to-bad" min="1" max="50" value="10"><span class="val" id="burst-to-bad-val">10%</span></div>
      <div class="control-row"><label>→Good prob</label><input type="range" id="burst-to-good" min="5" max="80" value="30"><span class="val" id="burst-to-good-val">30%</span></div>
    </div>
    <div id="asym-params" style="display:none">
      <div class="control-row"><label>DL Loss</label><input type="range" id="dl-loss" min="0" max="95" value="40"><span class="val" id="dl-loss-val">40%</span></div>
    </div>
    <div id="blackout-params" style="display:none">
      <div class="control-row"><label>Start tick</label><input type="number" id="bo-start" value="40" min="0" max="500" style="width:60px"></div>
      <div class="control-row"><label>End tick</label><input type="number" id="bo-end" value="70" min="0" max="500" style="width:60px"></div>
      <div class="control-row"><label>Direction</label><select id="bo-dir" style="width:80px"><option value="both">Both</option><option value="ul">UL only</option><option value="dl">DL only</option></select></div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Simulation</div>
    <div class="control-row"><label>Duration</label><input type="number" id="ticks" value="150" min="20" max="2000" style="width:70px"><span class="val">ticks</span></div>
    <div class="control-row"><label>Tick Rate</label><input type="number" id="tickhz" value="20" min="1" max="100" style="width:70px"><span class="val">Hz</span></div>
    <div class="control-row"><label>Seed</label><input type="number" id="seed" value="42" min="0" max="9999" style="width:70px"></div>
  </div>

  <div class="section" style="flex:1;min-height:0;">
    <div class="section-title">Reliable Messages</div>
    <div class="msg-list" id="msg-list"></div>
    <div class="add-msg">
      <select id="add-dir" style="width:50px"><option value="ul">UL</option><option value="dl">DL</option></select>
      <input type="number" id="add-tick" value="20" min="0" style="width:50px" placeholder="tick">
      <input type="text" id="add-label" value="CMD" style="width:60px" placeholder="label">
      <button onclick="addMsg()">+Add</button>
    </div>
  </div>

  <div class="transport">
    <div class="transport-btns">
      <button class="btn btn-primary" id="btn-run" onclick="runSim()">Run Simulation</button>
      <button class="btn btn-secondary" id="btn-pause" onclick="togglePause()" disabled>Pause</button>
      <button class="btn btn-secondary" id="btn-reset" onclick="resetSim()">Reset</button>
    </div>
    <div class="speed-row">
      <label>Speed:</label>
      <div class="speed-btns" id="speed-btns"></div>
    </div>
    <div class="progress-bar" id="progress-bar" onclick="seekProgress(event)">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
  </div>
</div>

<!-- Main -->
<div class="main">
  <div class="canvas-area">
    <canvas id="canvas"></canvas>
    <div class="overlay">
      <div class="overlay-card" id="ov-tick"><span class="big" id="ov-tick-val">—</span><br>Tick</div>
      <div class="overlay-card" id="ov-ul">UL <span id="ov-ul-sent">0</span> sent · <span id="ov-ul-lost" style="color:var(--fail)">0</span> lost</div>
      <div class="overlay-card" id="ov-dl">DL <span id="ov-dl-sent">0</span> sent · <span id="ov-dl-lost" style="color:var(--fail)">0</span> lost</div>
      <div class="overlay-card" id="ov-rel">Reliable: <span id="ov-rel-d" style="color:var(--ok)">0</span>/<span id="ov-rel-t">0</span></div>
    </div>
  </div>
  <div class="bottom-panel">
    <div class="tab-bar" id="tab-bar"></div>
    <div class="tab-content" id="tab-content"></div>
  </div>
</div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════════
// LDTP Protocol (JavaScript port)
// ═══════════════════════════════════════════════════════════════════════
const SEQ_MOD = 64, WINDOW_SIZE = 8, MAX_RETRIES = 5, RTO_TICKS = 4, RTO_MAX_EXP = 4;

function buildFC(r,a,f,typ){ return (r<<7)|(a<<6)|(f<<5)|((typ&7)<<2); }
function encACK(sid,cack,sack){ const w=((sid&7)<<13)|((cack&0x3F)<<7)|(sack&0x7F); return [w>>8,w&0xFF]; }
function encSeq(seq,frag){ return ((seq&0x3F)<<2)|(frag&3); }

function buildUnreliable(typeId, payload, ack){
  const fc = buildFC(0, ack?1:0, 0, typeId);
  let f = [fc]; if(ack) f.push(...encACK(...ack));
  f.push(...payload); return new Uint8Array(f);
}
function buildReliable(sid, seq, frag, more, payload, ack){
  const fc = buildFC(1, ack?1:0, more?1:0, sid);
  let f = [fc]; if(ack) f.push(...encACK(...ack));
  f.push(encSeq(seq,frag)); f.push(...payload); return new Uint8Array(f);
}
function decodeFrame(data){
  if(!data||!data.length) return null;
  const fc=data[0]; let off=1;
  const r={reliable:(fc>>7)&1, ack_present:(fc>>6)&1, more_frag:(fc>>5)&1,
           type_or_stream:(fc>>2)&7, version:fc&3, total_len:data.length};
  if(r.ack_present){
    if(data.length<off+2) return null;
    const w=(data[off]<<8)|data[off+1];
    r.ack_sid=(w>>13)&7; r.ack_cack=(w>>7)&0x3F; r.ack_sack=w&0x7F; off+=2;
  }
  if(r.reliable){ if(data.length<off+1) return null; const sc=data[off]; r.seq=(sc>>2)&0x3F; r.frag=sc&3; off++; }
  r.header_bytes=off; r.payload=data.slice(off); return r;
}
function seqDist(a,b){ return ((a-b)%SEQ_MOD+SEQ_MOD)%SEQ_MOD; }

class ReliableSender{
  constructor(sid){this.sid=sid;this.nextSeq=0;this.baseSeq=0;this.entries={};
    this.queue=[];this.delivered=[];this.failed=[];}
  queueMessage(payload,label){this.queue.push({payload,label});}
  hasWork(){return Object.keys(this.entries).length>0||this.queue.length>0;}
  tick(now){
    this._admit();const events=[];
    for(const seq of Object.keys(this.entries).map(Number)){
      const e=this.entries[seq];
      if(e.sent&&!e.acked&&!e.needsRetx){
        e.timer--;
        if(e.timer<=0){
          e.retxCount++;
          if(e.retxCount>MAX_RETRIES){
            events.push({event:'failed',seq,label:e.label});
            this.failed.push({seq,label:e.label});
            delete this.entries[seq]; this._advBase();
          }else{
            e.needsRetx=true;
            events.push({event:'retx_timeout',seq,label:e.label,attempt:e.retxCount});
          }
        }
      }
    } return events;
  }
  getFrame(ackInfo,now){
    this._admit();
    for(const seq of this._iterWin()){
      const e=this.entries[seq];
      if(!e||e.acked)continue;
      if(e.needsRetx) return this._tx(seq,e,ackInfo,now,true);
    }
    for(const seq of this._iterWin()){
      const e=this.entries[seq];
      if(!e||e.acked||e.sent)continue;
      return this._tx(seq,e,ackInfo,now,false);
    }
    return [null,null];
  }
  processAck(sid,cack,sack,now){
    if(sid!==this.sid)return[];
    const events=[];let seq=this.baseSeq,g=0;
    while(seq!==(cack+1)%SEQ_MOD&&g<SEQ_MOD){
      if(this.entries[seq]&&!this.entries[seq].acked){
        this.entries[seq].acked=true;
        const lat=now-this.entries[seq].sentTick;
        this.delivered.push({seq,label:this.entries[seq].label,latency:lat});
        events.push({event:'delivered',seq,label:this.entries[seq].label,latency:lat});
      }
      seq=(seq+1)%SEQ_MOD;g++;
    }
    for(let i=0;i<7;i++){
      const ss=(cack+1+i)%SEQ_MOD;
      if(sack&(1<<(6-i))){
        if(this.entries[ss]&&!this.entries[ss].acked){
          this.entries[ss].acked=true;
          const lat=now-this.entries[ss].sentTick;
          this.delivered.push({seq:ss,label:this.entries[ss].label,latency:lat});
          events.push({event:'delivered',seq:ss,label:this.entries[ss].label,latency:lat});
        }
      }
    }
    this._advBase();return events;
  }
  _admit(){
    while(this.queue.length&&this._winCount()<WINDOW_SIZE){
      const{payload,label}=this.queue.shift();
      this.entries[this.nextSeq]={payload,label,frag:0,moreFrag:false,sent:false,acked:false,
        retxCount:0,timer:0,needsRetx:false,sentTick:-1};
      this.nextSeq=(this.nextSeq+1)%SEQ_MOD;
    }
  }
  _tx(seq,e,ackInfo,now,isRetx){
    e.needsRetx=false;e.sent=true;if(e.sentTick<0)e.sentTick=now;
    e.timer=RTO_TICKS*(2**Math.min(e.retxCount,RTO_MAX_EXP));
    const frame=buildReliable(this.sid,seq,e.frag,e.moreFrag,e.payload,ackInfo);
    return [frame,{seq,label:e.label,isRetx,retxCount:e.retxCount}];
  }
  _winCount(){return seqDist(this.nextSeq,this.baseSeq);}
  _iterWin(){const r=[];let s=this.baseSeq;for(let i=0;i<this._winCount();i++){r.push(s);s=(s+1)%SEQ_MOD;}return r;}
  _advBase(){
    while(this.entries[this.baseSeq]&&this.entries[this.baseSeq].acked){delete this.entries[this.baseSeq];this.baseSeq=(this.baseSeq+1)%SEQ_MOD;}
    while(!this.entries[this.baseSeq]&&this.baseSeq!==this.nextSeq){this.baseSeq=(this.baseSeq+1)%SEQ_MOD;}
  }
}

class ReliableReceiver{
  constructor(sid){this.sid=sid;this.expected=0;this.buf={};this.deliveredList=[];this._hasData=false;}
  receive(seq,frag,more,payload){
    const dist=seqDist(seq,this.expected);
    if(dist>=SEQ_MOD/2)return false;
    if(this.buf[seq]!==undefined)return false;
    this._hasData=true;this.buf[seq]=payload;
    while(this.buf[this.expected]!==undefined){
      this.deliveredList.push(this.buf[this.expected]);
      delete this.buf[this.expected];this.expected=(this.expected+1)%SEQ_MOD;
    }
    return true;
  }
  getAck(){
    if(!this._hasData)return null;
    const cack=(this.expected-1+SEQ_MOD)%SEQ_MOD;
    let sack=0;for(let i=0;i<7;i++){if(this.buf[(this.expected+i)%SEQ_MOD]!==undefined)sack|=1<<(6-i);}
    return [this.sid,cack,sack];
  }
  popDelivered(){const o=this.deliveredList;this.deliveredList=[];return o;}
}

// ═══════════════════════════════════════════════════════════════════════
// Seeded Random
// ═══════════════════════════════════════════════════════════════════════
class Rand{
  constructor(s){this.s=s%2147483647;if(this.s<=0)this.s+=2147483646;}
  next(){this.s=this.s*16807%2147483647;return(this.s-1)/2147483646;}
}

// ═══════════════════════════════════════════════════════════════════════
// Channel Models
// ═══════════════════════════════════════════════════════════════════════
class UniformCh{ constructor(r,rng){this.rate=r;this.rng=rng;this.name=`Uniform ${(r*100).toFixed(0)}%`;}
  test(dir){return this.rng.next()>=this.rate;} }
class AsymCh{ constructor(ul,dl,rng){this.ul=ul;this.dl=dl;this.rng=rng;this.name=`Asym UL=${(ul*100)|0}% DL=${(dl*100)|0}%`;}
  test(dir){return this.rng.next()>=(dir==='ul'?this.ul:this.dl);} }
class BurstCh{
  constructor(pg,pb,tb,tg,rng,label){this.pg=pg;this.pb=pb;this.tb=tb;this.tg=tg;this.rng=rng;this.state='good';
    this.name=label||`Burst`;}
  test(dir){const p=this.state==='good'?this.pg:this.pb;const ok=this.rng.next()>=p;
    if(this.state==='good'){if(this.rng.next()<this.tb)this.state='bad';}
    else{if(this.rng.next()<this.tg)this.state='good';}return ok;}
}
class BlackoutCh{
  constructor(base,s,e,d,rng){this.base=base;this.s=s;this.e=e;this.d=d;this.rng=rng;this.tick=0;
    this.name=`Blackout t=[${s},${e}] ${d}`;}
  setTick(t){this.tick=t;}
  test(dir){if(this.tick>=this.s&&this.tick<this.e&&(this.d==='both'||this.d===dir))return false;
    return this.rng.next()>=this.base;}
}

// ═══════════════════════════════════════════════════════════════════════
// Simulation Engine
// ═══════════════════════════════════════════════════════════════════════
function makePayload(str){ return new Uint8Array([...str].map(c=>c.charCodeAt(0))); }
function makeRC(tick){ const d=[];for(let i=0;i<16;i++)d.push((1500+tick+i)&0xFF,(1500+tick+i)>>8);return new Uint8Array(d);}
function makeTelem(tick){ const types=['ATT','GPS','BAT'];const t=tick%3;
  return {type:t,typeName:types[t],data:makePayload(types[t]+':'+tick)};}

function runSimulation(cfg){
  const rng=new Rand(cfg.seed);
  let ch;
  switch(cfg.model){
    case 'burst': ch=new BurstCh(cfg.loss,cfg.burstBad,cfg.burstToBad,cfg.burstToGood,rng);break;
    case 'asymmetric': ch=new AsymCh(cfg.loss,cfg.dlLoss,rng);break;
    case 'blackout': ch=new BlackoutCh(cfg.loss,cfg.boStart,cfg.boEnd,cfg.boDir,rng);break;
    default: ch=new UniformCh(cfg.loss,rng);
  }
  const ulSender=new ReliableSender(0),ulReceiver=new ReliableReceiver(0);
  const dlSender=new ReliableSender(0),dlReceiver=new ReliableReceiver(0);

  const ticks=[];
  let ulSent=0,ulLost=0,dlSent=0,dlLost=0;

  // Build schedule maps — each entry carries an id for status tracking
  const ulSched={},dlSched={};
  cfg.messages.forEach((m,i)=>{
    const s=m.dir==='ul'?ulSched:dlSched;
    if(!s[m.tick])s[m.tick]=[];
    s[m.tick].push({payload:makePayload(m.label+':DATA'),label:m.label,id:i});
  });

  const totalReliable=cfg.messages.length;
  const reliableStatus=cfg.messages.map((m,i)=>({...m,id:i,status:'pending',seq:null,latency:null,retx:0}));

  for(let t=0;t<cfg.totalTicks;t++){
    if(ch.setTick)ch.setTick(t);
    const tickData={tick:t,events:[],particles:[]};

    // Timers
    for(const ev of ulSender.tick(t)){
      tickData.events.push({type:ev.event==='failed'?'fail':'retx',dir:'ul',msg:`UL ${ev.event} SEQ=${ev.seq} "${ev.label}" ${ev.attempt?'#'+ev.attempt:''}`});
      if(ev.event==='failed'){const rs=reliableStatus.find(r=>r.dir==='ul'&&r.label===ev.label&&(r.status==='inflight'||r.status==='queued'));if(rs)rs.status='failed';}
    }
    for(const ev of dlSender.tick(t)){
      tickData.events.push({type:ev.event==='failed'?'fail':'retx',dir:'dl',msg:`DL ${ev.event} SEQ=${ev.seq} "${ev.label}" ${ev.attempt?'#'+ev.attempt:''}`});
      if(ev.event==='failed'){const rs=reliableStatus.find(r=>r.dir==='dl'&&r.label===ev.label&&(r.status==='inflight'||r.status==='queued'));if(rs)rs.status='failed';}
    }

    // Enqueue
    if(ulSched[t])for(const m of ulSched[t]){
      ulSender.queueMessage(m.payload,m.label);
      tickData.events.push({type:'app',dir:'ul',msg:`GCS enqueues "${m.label}"`});
      const rs=reliableStatus.find(r=>r.id===m.id);if(rs)rs.status='queued';
    }
    if(dlSched[t])for(const m of dlSched[t]){
      dlSender.queueMessage(m.payload,m.label);
      tickData.events.push({type:'app',dir:'dl',msg:`UAV enqueues "${m.label}"`});
      const rs=reliableStatus.find(r=>r.id===m.id);if(rs)rs.status='queued';
    }

    // Prepare UL
    const dlAck=dlReceiver.getAck();
    let ulFrame,ulMeta;
    if(ulSender.hasWork()){
      const[f,m]=ulSender.getFrame(dlAck,t);
      if(f){ulFrame=f;ulMeta={ch:'reliable',seq:m.seq,label:m.label,isRetx:m.isRetx,retxCount:m.retxCount,hasAck:!!dlAck};
        tickData.events.push({type:m.isRetx?'retx':'rel',dir:'ul',msg:`UL TX reliable SEQ=${m.seq} "${m.label}"${m.isRetx?' RETX#'+m.retxCount:''}`});
        const rs=reliableStatus.find(r=>r.dir==='ul'&&r.label===m.label&&(r.status==='queued'||r.status==='inflight'));
        if(rs){rs.status='inflight';rs.seq=m.seq;if(m.isRetx)rs.retx=m.retxCount;}
      }
    }
    if(!ulFrame){ulFrame=buildUnreliable(0,makeRC(t),dlAck);ulMeta={ch:'unreliable',type:'RC',hasAck:!!dlAck};}

    // Prepare DL
    const ulAck=ulReceiver.getAck();
    let dlFrame,dlMeta;
    if(dlSender.hasWork()){
      const[f,m]=dlSender.getFrame(ulAck,t);
      if(f){dlFrame=f;dlMeta={ch:'reliable',seq:m.seq,label:m.label,isRetx:m.isRetx,retxCount:m.retxCount,hasAck:!!ulAck};
        tickData.events.push({type:m.isRetx?'retx':'rel',dir:'dl',msg:`DL TX reliable SEQ=${m.seq} "${m.label}"${m.isRetx?' RETX#'+m.retxCount:''}`});
        const rs=reliableStatus.find(r=>r.dir==='dl'&&r.label===m.label&&(r.status==='queued'||r.status==='inflight'));
        if(rs){rs.status='inflight';rs.seq=m.seq;if(m.isRetx)rs.retx=m.retxCount;}
      }
    }
    if(!dlFrame){const tm=makeTelem(t);dlFrame=buildUnreliable(tm.type,tm.data,ulAck);
      dlMeta={ch:'unreliable',type:tm.typeName,hasAck:!!ulAck};}

    // Channel
    const ulOk=ch.test('ul'),dlOk=ch.test('dl');
    ulSent++;dlSent++;
    if(!ulOk)ulLost++;if(!dlOk)dlLost++;

    // Particles for animation
    tickData.particles.push({dir:'ul',meta:ulMeta,lost:!ulOk,frame:ulFrame});
    tickData.particles.push({dir:'dl',meta:dlMeta,lost:!dlOk,frame:dlFrame});
    tickData.events.push({type:ulOk?'ok':'lost',dir:'ul',msg:`UL ${ulOk?'✓ delivered':'✗ LOST'} [${ulMeta.ch}${ulMeta.ch==='reliable'?' SEQ='+ulMeta.seq:''}]`});
    tickData.events.push({type:dlOk?'ok':'lost',dir:'dl',msg:`DL ${dlOk?'✓ delivered':'✗ LOST'} [${dlMeta.ch}${dlMeta.ch==='reliable'?' SEQ='+dlMeta.seq:''}]`});

    // Process received
    if(dlOk){
      const d=decodeFrame(dlFrame);
      if(d){
        if(d.ack_present){
          for(const ev of ulSender.processAck(d.ack_sid,d.ack_cack,d.ack_sack,t)){
            tickData.events.push({type:'ack',dir:'ul',msg:`GCS got ACK: ${ev.event} SEQ=${ev.seq} "${ev.label}" lat=${ev.latency}`});
            if(ev.event==='delivered'){const rs=reliableStatus.find(r=>r.dir==='ul'&&r.label===ev.label&&r.status==='inflight');
              if(rs){rs.status='delivered';rs.latency=ev.latency;}}
          }
        }
        if(d.reliable){dlReceiver.receive(d.seq,d.frag,d.more_frag,d.payload);
          for(const p of dlReceiver.popDelivered())tickData.events.push({type:'app',dir:'dl',msg:`GCS APP received DL reliable`});}
      }
    }
    if(ulOk){
      const d=decodeFrame(ulFrame);
      if(d){
        if(d.ack_present){
          for(const ev of dlSender.processAck(d.ack_sid,d.ack_cack,d.ack_sack,t)){
            tickData.events.push({type:'ack',dir:'dl',msg:`UAV got ACK: ${ev.event} SEQ=${ev.seq} "${ev.label}" lat=${ev.latency}`});
            if(ev.event==='delivered'){const rs=reliableStatus.find(r=>r.dir==='dl'&&r.label===ev.label&&r.status==='inflight');
              if(rs){rs.status='delivered';rs.latency=ev.latency;}}
          }
        }
        if(d.reliable){ulReceiver.receive(d.seq,d.frag,d.more_frag,d.payload);
          for(const p of ulReceiver.popDelivered())tickData.events.push({type:'app',dir:'ul',msg:`UAV APP received UL reliable`});}
      }
    }

    tickData.stats={ulSent,ulLost,dlSent,dlLost,
      relDelivered:reliableStatus.filter(r=>r.status==='delivered').length,
      relTotal:totalReliable};
    tickData.reliableStatus=reliableStatus.map(r=>({...r}));
    ticks.push(tickData);
  }

  // Mark any remaining inflight/queued messages as "timeout" (sim ended before resolution)
  for(const rs of reliableStatus){
    if(rs.status==='inflight'||rs.status==='queued') rs.status='timeout';
  }
  // Count timeouts
  const ulTimeout=reliableStatus.filter(r=>r.dir==='ul'&&r.status==='timeout').length;
  const dlTimeout=reliableStatus.filter(r=>r.dir==='dl'&&r.status==='timeout').length;

  return {ticks,channelName:ch.name,reliableStatus,
    summary:{ulSent,ulLost,dlSent,dlLost,
      ulDelivered:ulSender.delivered.length,ulFailed:ulSender.failed.length,
      dlDelivered:dlSender.delivered.length,dlFailed:dlSender.failed.length,
      ulTimeout,dlTimeout,
      totalReliable,delivered:ulSender.delivered.concat(dlSender.delivered),
      failed:ulSender.failed.concat(dlSender.failed)}};
}

// Canvas Renderer
// ═══════════════════════════════════════════════════════════════════════
const canvas=document.getElementById('canvas');
const ctx=canvas.getContext('2d');
let W,H;
function resize(){const r=canvas.parentElement.getBoundingClientRect();
  canvas.width=r.width*devicePixelRatio;canvas.height=r.height*devicePixelRatio;
  W=r.width;H=r.height;ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);}
window.addEventListener('resize',resize);resize();

// Node positions
const NODE_R=40;
function gcsPos(){return{x:90,y:H/2};}
function uavPos(){return{x:W-90,y:H/2};}

// Active particles
let activeParticles=[];
let flashEffects=[];

function addParticle(dir,meta,lost,startTime,duration){
  const isRel=meta.ch==='reliable';const isRetx=meta.isRetx;
  const color=lost?'#e74c3c':isRetx?'#e056a0':isRel?'#3498db':'#27ae60';
  const label=isRel?`R${meta.seq}`:(meta.type||'');
  const hasAck=meta.hasAck;
  // UL: left→right (y offset up), DL: right→left (y offset down)
  const yOff=dir==='ul'?-30:30;
  const from=dir==='ul'?gcsPos():uavPos();
  const to=dir==='ul'?uavPos():gcsPos();
  const lostAt=lost?0.3+Math.random()*0.4:1;
  activeParticles.push({dir,color,label,hasAck,lost,isRel,isRetx,
    fromX:from.x,fromY:from.y+yOff,toX:to.x,toY:to.y+yOff,
    startTime,duration,lostAt,alpha:1});
}

function addFlash(x,y,color,startTime){
  flashEffects.push({x,y,color,startTime,duration:400});
}

function drawNode(x,y,label,color){
  // Glow
  const grad=ctx.createRadialGradient(x,y,NODE_R*0.5,x,y,NODE_R*1.5);
  grad.addColorStop(0,color+'40');grad.addColorStop(1,'transparent');
  ctx.fillStyle=grad;ctx.beginPath();ctx.arc(x,y,NODE_R*1.5,0,Math.PI*2);ctx.fill();
  // Circle
  ctx.beginPath();ctx.arc(x,y,NODE_R,0,Math.PI*2);
  ctx.fillStyle='#1a2332';ctx.fill();
  ctx.strokeStyle=color;ctx.lineWidth=2;ctx.stroke();
  // Icon
  ctx.fillStyle=color;ctx.font='bold 13px Inter,sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(label,x,y);
}

function drawChannel(y,label,dir){
  const g=gcsPos(),u=uavPos();
  const x1=g.x+NODE_R+10,x2=u.x-NODE_R-10;
  ctx.strokeStyle='#2a3a4e';ctx.lineWidth=1;ctx.setLineDash([4,4]);
  ctx.beginPath();ctx.moveTo(x1,y);ctx.lineTo(x2,y);ctx.stroke();ctx.setLineDash([]);
  // Arrow
  const ax=dir==='ul'?x2-8:x1+8,ay=y;
  ctx.fillStyle='#2a3a4e';ctx.beginPath();
  if(dir==='ul'){ctx.moveTo(x2,y);ctx.lineTo(x2-10,y-5);ctx.lineTo(x2-10,y+5);}
  else{ctx.moveTo(x1,y);ctx.lineTo(x1+10,y-5);ctx.lineTo(x1+10,y+5);}
  ctx.fill();
  // Label
  ctx.fillStyle='#3a4a5e';ctx.font='10px Inter,sans-serif';ctx.textAlign='center';
  ctx.fillText(label,(x1+x2)/2,y-10);
}

function drawParticle(p,now){
  const elapsed=now-p.startTime;
  const progress=Math.min(elapsed/p.duration,1);
  if(progress>=1&&!p.lost){p.alpha-=0.05;if(p.alpha<=0)return false;}
  if(p.lost&&progress>=p.lostAt){p.alpha-=0.03;if(p.alpha<=0)return false;}
  const t=p.lost?Math.min(progress,p.lostAt):progress;
  const eased=t<0.5?2*t*t:1-(-2*t+2)**2/2; // ease in-out quad
  const x=p.fromX+(p.toX-p.fromX)*eased;
  const y=p.fromY+(p.toY-p.fromY)*eased+Math.sin(eased*Math.PI)*-15;
  const size=p.isRel?8:6;
  ctx.globalAlpha=p.alpha;
  // Trail
  if(progress<(p.lost?p.lostAt:1)){
    const tLen=0.15;const t0=Math.max(0,t-tLen);
    const e0=t0<0.5?2*t0*t0:1-(-2*t0+2)**2/2;
    const tx=p.fromX+(p.toX-p.fromX)*e0;
    const ty=p.fromY+(p.toY-p.fromY)*e0+Math.sin(e0*Math.PI)*-15;
    const tg=ctx.createLinearGradient(tx,ty,x,y);
    tg.addColorStop(0,'transparent');tg.addColorStop(1,p.color+'80');
    ctx.strokeStyle=tg;ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(tx,ty);ctx.lineTo(x,y);ctx.stroke();
  }
  // Packet body
  ctx.fillStyle=p.color;
  if(p.isRel){ctx.fillRect(x-size,y-size/2,size*2,size);}
  else{ctx.beginPath();ctx.arc(x,y,size/2,0,Math.PI*2);ctx.fill();}
  // Label
  if(p.label){ctx.fillStyle='#fff';ctx.font='bold 9px Inter';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(p.label,x,y);}
  // ACK dot
  if(p.hasAck){ctx.fillStyle='#f39c12';ctx.beginPath();ctx.arc(x+size+3,y-size/2,3,0,Math.PI*2);ctx.fill();}
  // Lost X
  if(p.lost&&progress>=p.lostAt){
    ctx.strokeStyle='#e74c3c';ctx.lineWidth=3;
    ctx.beginPath();ctx.moveTo(x-10,y-10);ctx.lineTo(x+10,y+10);ctx.stroke();
    ctx.beginPath();ctx.moveTo(x+10,y-10);ctx.lineTo(x-10,y+10);ctx.stroke();
    // Scatter particles
    for(let i=0;i<4;i++){
      const ang=i*Math.PI/2+(elapsed%200)/200*Math.PI;
      const d=8+elapsed*0.02;
      ctx.fillStyle='#e74c3c';ctx.globalAlpha=p.alpha*0.5;
      ctx.beginPath();ctx.arc(x+Math.cos(ang)*d,y+Math.sin(ang)*d,2,0,Math.PI*2);ctx.fill();
    }
  }
  ctx.globalAlpha=1;
  return true;
}

function drawFlash(f,now){
  const elapsed=now-f.startTime;if(elapsed>f.duration)return false;
  const t=elapsed/f.duration;
  ctx.globalAlpha=1-t;ctx.strokeStyle=f.color;ctx.lineWidth=2;
  ctx.beginPath();ctx.arc(f.x,f.y,10+t*25,0,Math.PI*2);ctx.stroke();ctx.globalAlpha=1;
  return true;
}

// Blackout overlay
let blackoutActive=false;
function drawBlackout(){
  if(!blackoutActive)return;
  ctx.fillStyle='rgba(0,0,0,0.3)';ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#e74c3c';ctx.font='bold 16px Inter';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('⚡ BLACKOUT ⚡',W/2,H/2);
}

function render(now){
  ctx.clearRect(0,0,W,H);
  const g=gcsPos(),u=uavPos();
  // Channels
  drawChannel(g.y-30,'Uplink (GCS → UAV)','ul');
  drawChannel(g.y+30,'Downlink (UAV → GCS)','dl');
  // Nodes
  drawNode(g.x,g.y,'GCS','#00b4d8');
  drawNode(u.x,u.y,'UAV','#2ecc71');
  // Particles
  activeParticles=activeParticles.filter(p=>drawParticle(p,now));
  flashEffects=flashEffects.filter(f=>drawFlash(f,now));
  drawBlackout();
  // Legend
  ctx.globalAlpha=0.6;ctx.font='10px Inter';ctx.textAlign='left';ctx.fillStyle='#6b7d8e';
  const lx=10,ly=H-60;
  ctx.fillStyle='#27ae60';ctx.fillRect(lx,ly,8,8);ctx.fillStyle='#6b7d8e';ctx.fillText('Unreliable',lx+12,ly+8);
  ctx.fillStyle='#3498db';ctx.fillRect(lx,ly+14,10,6);ctx.fillStyle='#6b7d8e';ctx.fillText('Reliable',lx+14,ly+22);
  ctx.fillStyle='#e056a0';ctx.fillRect(lx,ly+28,10,6);ctx.fillStyle='#6b7d8e';ctx.fillText('Retransmit',lx+14,ly+36);
  ctx.fillStyle='#f39c12';ctx.beginPath();ctx.arc(lx+4,ly+48,4,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#6b7d8e';ctx.fillText('Has ACK',lx+14,ly+50);
  ctx.globalAlpha=1;
}

// Playback Controller
// ═══════════════════════════════════════════════════════════════════════
let simData=null, playTick=0, playing=false, playSpeed=1;
let lastFrameTime=0, tickAccum=0, animTime=0;
const SPEEDS=[{label:'0.2x',val:0.2},{label:'0.5x',val:0.5},{label:'1x',val:1},
  {label:'2x',val:2},{label:'5x',val:5},{label:'Max',val:100}];
let selectedSpeed=2; // index into SPEEDS (1x)

function msPerTick(){return Math.max(10, 500/SPEEDS[selectedSpeed].val);}

function playbackLoop(timestamp){
  if(!simData||!playing){requestAnimationFrame(playbackLoop);render(performance.now());return;}
  if(!lastFrameTime)lastFrameTime=timestamp;
  const dt=timestamp-lastFrameTime;lastFrameTime=timestamp;
  tickAccum+=dt;
  const mpt=msPerTick();
  while(tickAccum>=mpt&&playTick<simData.ticks.length){
    advanceTick(performance.now());
    tickAccum-=mpt;
    if(playTick>=simData.ticks.length){playing=false;updateButtons();break;}
  }
  render(performance.now());
  requestAnimationFrame(playbackLoop);
}

function advanceTick(now){
  if(playTick>=simData.ticks.length)return;
  const td=simData.ticks[playTick];
  const dur=msPerTick()*0.8;

  // Check blackout
  const cfg=getConfig();
  blackoutActive=cfg.model==='blackout'&&playTick>=cfg.boStart&&playTick<cfg.boEnd;

  // Add particles
  for(const p of td.particles){
    addParticle(p.dir,p.meta,p.lost,now,dur);
    if(!p.lost){
      const target=p.dir==='ul'?uavPos():gcsPos();
      const yOff=p.dir==='ul'?-30:30;
      setTimeout(()=>addFlash(target.x,target.y+yOff,p.meta.ch==='reliable'?'#3498db':'#27ae60',performance.now()),dur*0.9);
    }
  }

  // Update UI
  updateOverlay(td.stats);
  appendLogEntries(td.events,td.tick);
  updateMsgTracker(td.reliableStatus);
  updateProgress();
  playTick++;
}

    const t=document.createElement('div');t.className='tab'+(i===0?' active':'');t.textContent=name;
    t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));t.classList.add('active');
      document.querySelectorAll('.tab-pane').forEach(x=>x.classList.remove('active'));
      document.getElementById('tab-'+i).classList.add('active');};
    bar.appendChild(t);
    const p=document.createElement('div');p.className='tab-pane'+(i===0?' active':'');p.id='tab-'+i;
    content.appendChild(p);
  });
}

// -- Log --
function appendLogEntries(events,tick){
  const el=document.getElementById('tab-0');
  for(const e of events){
    const div=document.createElement('div');div.className='log-entry '+e.type;
    div.innerHTML=`<span class="tick">[t=${tick}]</span> ${e.msg}`;
    el.appendChild(div);
  }
  el.scrollTop=el.scrollHeight;
}

// -- Message tracker --
function updateMsgTracker(statuses){
  const el=document.getElementById('tab-1');
  if(!statuses)return;
  let html='<div class="msg-tracker">';
  for(const s of statuses){
    html+=`<div class="msg-track ${s.status}">
      <div class="dir">${s.dir==='ul'?'UL (GCS→UAV)':'DL (UAV→GCS)'}</div>
      <div class="name">${s.label}</div>
      <div class="info">t=${s.tick} | ${s.status}${s.seq!==null?' SEQ='+s.seq:''}${s.latency!==null?' | lat='+s.latency+'t':''}${s.retx?' | retx='+s.retx:''}</div>
    </div>`;
  }
  html+='</div>';el.innerHTML=html;
}

// -- Stats --
function renderStats(){
  if(!simData)return;
  const s=simData.summary;const el=document.getElementById('tab-2');
  const ms=parseInt(document.getElementById('tickhz').value)||20;
  let html='<div class="stats-grid">';
  html+=statCard(s.ulSent+s.dlSent,'Total Packets');
  html+=statCard(s.ulLost+s.dlLost,`Lost (${((s.ulLost+s.dlLost)*100/(s.ulSent+s.dlSent)).toFixed(1)}%)`,'warn');
  html+=statCard(`${s.ulDelivered}/${s.ulDelivered+s.ulFailed}`,'UL Reliable');
  html+=statCard(`${s.dlDelivered}/${s.dlDelivered+s.dlFailed}`,'DL Reliable');
  const ulAvg=s.delivered.filter(d=>messages.find(m=>m.dir==='ul'&&m.label===d.label));
  const dlAvg=s.delivered.filter(d=>messages.find(m=>m.dir==='dl'&&m.label===d.label));
  if(ulAvg.length)html+=statCard((ulAvg.reduce((a,b)=>a+b.latency,0)/ulAvg.length).toFixed(1)+'t','UL Avg Latency');
  if(dlAvg.length)html+=statCard((dlAvg.reduce((a,b)=>a+b.latency,0)/dlAvg.length).toFixed(1)+'t','DL Avg Latency');
  if(s.failed.length)html+=statCard(s.failed.length,'FAILED','fail');
  if(s.ulTimeout+s.dlTimeout>0)html+=statCard(s.ulTimeout+s.dlTimeout,'TIMEOUT (sim ended)','warn');
  html+='</div>';
  // Delivered details
  html+='<h3 style="margin:12px 0 8px;color:#58a6ff;font-size:14px;">Delivery Details</h3>';
  if(s.delivered.length){
    for(const d of s.delivered) html+=`<div class="log-entry ok">✓ SEQ=${d.seq} "${d.label}" latency=${d.latency} ticks (${d.latency*(1000/ms)}ms)</div>`;
  }
  if(s.failed.length){
    for(const f of s.failed) html+=`<div class="log-entry lost">✗ SEQ=${f.seq} "${f.label}" FAILED</div>`;
  }
  el.innerHTML=html;
}
function statCard(v,l,cls){return `<div class="stat-card"><div class="v${cls?' '+cls:''}">${v}</div><div class="l">${l}</div></div>`;}

// -- Overlay --
function updateOverlay(stats){
  document.getElementById('ov-tick-val').textContent=playTick;
  document.getElementById('ov-ul-sent').textContent=stats.ulSent;
  document.getElementById('ov-ul-lost').textContent=stats.ulLost;
  document.getElementById('ov-dl-sent').textContent=stats.dlSent;
  document.getElementById('ov-dl-lost').textContent=stats.dlLost;
  document.getElementById('ov-rel-d').textContent=stats.relDelivered;
  document.getElementById('ov-rel-t').textContent=stats.relTotal;
}
function updateProgress(){
  if(!simData)return;
  const pct=playTick/simData.ticks.length*100;
  document.getElementById('progress-fill').style.width=pct+'%';
}
window.seekProgress=function(e){
  if(!simData)return;
  const rect=e.currentTarget.getBoundingClientRect();
  const pct=(e.clientX-rect.left)/rect.width;
  const target=Math.floor(pct*simData.ticks.length);
  replayTo(target);
};

function replayTo(target){
  if(!simData)return;
  // Reset state and replay events up to target
  document.getElementById('tab-0').innerHTML='';
  activeParticles=[];flashEffects=[];
  playTick=0;
  // Replay all ticks silently (no animation)
  for(let i=0;i<Math.min(target,simData.ticks.length);i++){
    const td=simData.ticks[i];
    appendLogEntries(td.events,td.tick);
    playTick=i+1;
  }
  if(target<simData.ticks.length){
    const td=simData.ticks[Math.max(0,target-1)];
    if(td){updateOverlay(td.stats);updateMsgTracker(td.reliableStatus);}
  }
  updateProgress();
}

// -- Controls --
function getConfig(){
  return{
    model:document.getElementById('ch-model').value,
    loss:parseInt(document.getElementById('loss').value)/100,
    burstBad:parseInt(document.getElementById('burst-bad').value)/100,
    burstToBad:parseInt(document.getElementById('burst-to-bad').value)/100,
    burstToGood:parseInt(document.getElementById('burst-to-good').value)/100,
    dlLoss:parseInt(document.getElementById('dl-loss').value)/100,
    boStart:parseInt(document.getElementById('bo-start').value),
    boEnd:parseInt(document.getElementById('bo-end').value),
    boDir:document.getElementById('bo-dir').value,
    totalTicks:parseInt(document.getElementById('ticks').value)||150,
    tickHz:parseInt(document.getElementById('tickhz').value)||20,
    seed:parseInt(document.getElementById('seed').value)||42,
    messages:messages.slice(),
  };
}

window.runSim=function(){
  const cfg=getConfig();
  // Reset
  activeParticles=[];flashEffects=[];playTick=0;playing=false;blackoutActive=false;
  document.getElementById('tab-0').innerHTML='';
  document.getElementById('tab-1').innerHTML='';
  document.getElementById('tab-2').innerHTML='';
  tickAccum=0;lastFrameTime=0;

  // Run simulation (instant)
  simData=runSimulation(cfg);

  // Start playback
  playing=true;
  updateButtons();
};

window.togglePause=function(){
  if(!simData)return;
  playing=!playing;lastFrameTime=0;tickAccum=0;
  updateButtons();
  if(playing&&playTick>=simData.ticks.length){
    // Restart from beginning
    replayTo(0);playTick=0;playing=true;updateButtons();
  }
};

window.resetSim=function(){
  simData=null;playTick=0;playing=false;blackoutActive=false;
  activeParticles=[];flashEffects=[];
  document.getElementById('tab-0').innerHTML='';
  document.getElementById('tab-1').innerHTML='';
  document.getElementById('tab-2').innerHTML='';
  document.getElementById('progress-fill').style.width='0%';
  document.getElementById('ov-tick-val').textContent='—';
  document.getElementById('ov-ul-sent').textContent='0';
  document.getElementById('ov-ul-lost').textContent='0';
  document.getElementById('ov-dl-sent').textContent='0';
  document.getElementById('ov-dl-lost').textContent='0';
  document.getElementById('ov-rel-d').textContent='0';
  document.getElementById('ov-rel-t').textContent='0';
  updateButtons();
};

function updateButtons(){
  document.getElementById('btn-run').disabled=playing;
  document.getElementById('btn-pause').disabled=!simData;
  document.getElementById('btn-pause').textContent=playing?'Pause':'Resume';
  if(simData&&playTick>=simData.ticks.length){
    document.getElementById('btn-run').disabled=false;
    document.getElementById('btn-pause').textContent='Replay';
    renderStats();
  }
}

// Watch for sim end
let prevPlaying=false;
function checkSimEnd(){
  if(prevPlaying&&!playing&&simData&&playTick>=simData.ticks.length){renderStats();}
  prevPlaying=playing;
}
setInterval(checkSimEnd,200);

// ═══════════════════════════════════════════════════════════════════════
// Init
// ═══════════════════════════════════════════════════════════════════════
initPresets();initSpeed();initTabs();renderMessages();updateSliderVals();
requestAnimationFrame(playbackLoop);
</script>
